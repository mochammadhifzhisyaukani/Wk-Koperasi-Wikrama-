<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- link bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- link font poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <!-- link animate -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <!-- link style global -->
    <link rel="stylesheet" href="/src/style/global.css">
    <!-- link style navbar -->
    <link rel="stylesheet" href="/src/style/component/navbar.css">
    <!-- link style footer -->
    <link rel="stylesheet" href="/src/style/component/footer.css">
    <!-- link style index -->
    <link rel="stylesheet" href="/src/style/produk.css">

    <link rel="icon" type="image/png" href="/src/assets/images/Pavicon.png" sizes="512x512">
    <title>Koperasi Wikrama</title>
</head>

<body>
    <header class="container-sm">
        <nav id="navbar" class="mt-5">
        </nav>
    </header>
    <main class="container-sm mb-4">
        <div class="mt-5 mb-4">
            <div id="keranjang-container">
                <div class="shop">
                    Keranjang : <span id="cart-count">0</span>
                </div>

                <button id="cart-btn">
                    Lihat Checkout
                </button>
            </div>


            <div id="content" class="animate__animated animate__fadeInDown mt-5">
                <section class="hero">
                    <div class="hero-text">
                        <h1>Belanja <span>Mudah & Modern</span></h1>
                        <p>Temukan kebutuhan sekolah terbaik di Koperasi Wikrama</p>
                        <button id="shop-btn">Belanja Sekarang</button>
                    </div>
                    <div class="hero-image">
                        <img src="https://cdn-icons-png.flaticon.com/512/3144/3144456.png" alt="Hero Image">
                    </div>
                </section>

                <section class="products-section" id="produk">
                    <div class="section-title">
                        <h2>Produk Populer</h2>
                    </div>
                    <div class="products" id="products-container">
                    </div>
                </section>

                <section class="category-section" id="kategori">
                    <div class="section-title">
                        <h2>Kategori Produk</h2>
                    </div>
                    <div class="categories">
                        <div class="category">
                            <h3>ATK</h3>
                            <p>Alat tulis lengkap</p>
                        </div>
                        <div class="category">
                            <h3>Aksesoris</h3>
                            <p>Produk aksesoris modern</p>
                        </div>
                        <div class="category">
                            <h3>Seragam</h3>
                            <p>Produk pakaian sekolah</p>
                        </div>
                    </div>
                </section>

                <div class="modal-checkout" id="checkout-modal">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h2>Detail Tab Checkout</h2>
                            <span class="close-btn" id="close-modal">&times;</span>
                        </div>
                        <div class="checkout-items-list" id="checkout-items">
                        </div>
                        <div class="modal-footer">
                            <h3>Total Bayar:</h3>
                            <span class="total-price-style" id="total-price">Rp 0</span>
                        </div>
                    </div>
                </div>

                <div class="popup" id="popup">
                    Produk berhasil ditambahkan 🛒
                </div>
            </div>
    </main>

    <footer id="footer" class="animate__animated animate__fadeInDown container-sm">
    </footer>
</body>


<!-- script navbar -->
<script src="/src/js/component/navbar.js"></script>
<!-- script index -->
<script src="/src/js/produk.js"></script>
<!-- script footer -->
<script src="/src/js/component/footer.js"></script>

</html>
